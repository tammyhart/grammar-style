name: Create Release

on:
  push:
    tags:
      - 'v*' # Trigger on any tag that starts with 'v', like v0.3.2

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required permission to create releases

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true # GitHub will auto-generate release notes based on pull requests/commits
